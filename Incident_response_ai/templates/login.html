<!DOCTYPE html>
<html>
<head>
    <title>Login - Incident Response Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, hsl(287, 72%, 56%), hwb(180 25% 15%), #274856);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1; /* take available space */
            display: flex;
            justify-content: center;
            align-items: center; /* centers login box vertically and horizontally */
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
            color: #f4f4f4;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 26px;
            color: #ffffff;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 12px 0;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        input::placeholder {
            color: #ddd;
        }

        button {
            width: 95%;
            padding: 12px;
            font-size: 18px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #0056b3;
        }

        /* Footer styling */
        .footer {
            padding: 10px;
            text-align: center;
            color: #f4f4f4;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="login-container">
            <h2>Incident Response Tool<br>Login</h2>
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Designed and Developed by Riddhi (CS23088)
    </div>
</body>
</html>
